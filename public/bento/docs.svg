<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Documentation properties placeholder">
  <rect width="800" height="500" fill="#ffffff"/>
  <!-- panel header -->
  <rect x="40" y="34" width="120" height="14" rx="7" fill="#27272a"/>
  <rect x="40" y="60" width="720" height="1" fill="#e4e4e7"/>
  <!-- property rows: label left, value control right -->
  <g>
    <!-- row template repeated -->
    <rect x="40" y="84" width="120" height="9" rx="4" fill="#a1a1aa"/>
    <rect x="420" y="76" width="340" height="26" rx="7" fill="#f4f4f5" stroke="#e4e4e7"/>
    <rect x="40" y="128" width="100" height="9" rx="4" fill="#a1a1aa"/>
    <rect x="420" y="120" width="340" height="26" rx="7" fill="#f4f4f5" stroke="#e4e4e7"/>
    <rect x="40" y="172" width="90" height="9" rx="4" fill="#a1a1aa"/>
    <rect x="420" y="164" width="160" height="26" rx="7" fill="#f4f4f5" stroke="#e4e4e7"/>
    <rect x="40" y="216" width="110" height="9" rx="4" fill="#a1a1aa"/>
    <rect x="420" y="208" width="160" height="26" rx="7" fill="#f4f4f5" stroke="#e4e4e7"/>
    <!-- color row with swatch -->
    <rect x="40" y="260" width="80" height="9" rx="4" fill="#a1a1aa"/>
    <circle cx="434" cy="265" r="9" fill="#f84416"/>
    <rect x="452" y="261" width="120" height="9" rx="4" fill="#d4d4d8"/>
    <!-- toggle row -->
    <rect x="40" y="304" width="120" height="9" rx="4" fill="#a1a1aa"/>
    <rect x="420" y="300" width="44" height="20" rx="10" fill="#f84416"/>
    <circle cx="454" cy="310" r="7" fill="#ffffff"/>
    <rect x="40" y="348" width="100" height="9" rx="4" fill="#a1a1aa"/>
    <rect x="420" y="340" width="340" height="26" rx="7" fill="#f4f4f5" stroke="#e4e4e7"/>
  </g>
</svg>
