name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer commit on the same branch/PR supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this gate only reads the repo, it never writes back.
permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  verify:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      # Strict install from the lockfile; fails if package.json and the lock disagree.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Component + a11y tests (Vitest + Testing Library + jsdom + axe).
      - name: Test
        run: npm test

      # Runs build-registry.mjs then `next build` (same as the local build script).
      - name: Build
        run: npm run build
